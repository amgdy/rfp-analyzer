[server]
# Maximum size of file uploads (in MB)
maxUploadSize = 500

# Maximum size of message that can be sent via websocket (in MB)
maxMessageSize = 500

# Disable WebSocket compression to prevent message corruption behind
# reverse-proxies (Envoy in Azure Container Apps) which can surface as
# AxiosError 400 on file upload.
enableWebsocketCompression = false

# Enable CORS for container environments
enableCORS = false
enableXsrfProtection = false

[browser]
# Disable file watcher in production
gatherUsageStats = false

[theme]
primaryColor = "#4F46E5"
backgroundColor = "#FAFAFA"
secondaryBackgroundColor = "#F3F4F6"
textColor = "#1F2937"
font = "sans serif"
