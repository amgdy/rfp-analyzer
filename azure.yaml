# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: rfp-analyzer
services:
  rfp-analyzer:
    project: RfpAnalyzer/RfpAnalyzer
    host: containerapp
    language: dotnet
    docker:
      path: Dockerfile
      remoteBuild: true

hooks:
  postprovision:
    posix:
      shell: sh
      run: ./infra/hooks/postprovision.sh
      interactive: true
    windows:
      shell: pwsh
      run: ./infra/hooks/postprovision.ps1
      interactive: true